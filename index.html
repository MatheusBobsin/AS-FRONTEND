<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espaço de Trabalho - Tarefas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-6 bg-neutral-950 min-h-screen flex flex-col items-center">
    
    <header class="w-full max-w-4xl border-b border-purple-900/20 pb-4 mb-6 flex flex-col sm:flex-row justify-between items-center gap-2">
        <div>
            <h1 class="text-2xl font-black tracking-tight text-white">Espaço de Trabalho</h1>
            <p class="text-purple-400/60 text-xs font-medium tracking-wide uppercase mt-0.5">Produtividade Pessoal</p>
        </div>
        
        <div class="bg-neutral-900 px-4 py-2 rounded-xl border border-purple-900/30 flex gap-5 text-xs font-bold text-neutral-300 shadow-sm">
            <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-red-500"></span> Alta</span>
            <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-yellow-500"></span> Média</span>
            <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-green-500"></span> Baixa</span>
        </div>
    </header>

    <main class="w-full max-w-4xl flex flex-col gap-6">
        
        <section class="bg-neutral-900 p-4 rounded-xl border border-purple-900/20 shadow-md">
            <div class="flex flex-col sm:flex-row gap-3">
                <input id="inputTarefa" type="text" placeholder="Qual o próximo objetivo ou missão?..." 
                    class="flex-1 border border-neutral-800 bg-neutral-950 rounded-lg p-3 text-white placeholder-neutral-500 font-medium text-sm focus:outline-none focus:border-purple-500 transition-colors">
                
                <div class="flex gap-3">
                    <select id="selectPrioridade" class="border border-neutral-800 bg-neutral-950 rounded-lg p-3 text-sm text-neutral-300 font-semibold focus:outline-none focus:border-purple-500 cursor-pointer">
                        <option value="baixa">Prioridade Baixa</option>
                        <option value="media">Prioridade Média</option>
                        <option value="alta">Prioridade Alta</option>
                    </select>
                    
                    <button onclick="criarNovaTarefa()" class="bg-purple-600 hover:bg-purple-700 text-white font-extrabold text-sm px-6 py-3 rounded-lg cursor-pointer transition-all shadow-md active:scale-95">
                        Adicionar
                    </button>
                </div>
            </div>
            
            <p id="mensagemErro" class="text-red-400 text-xs font-bold mt-2 hidden">Aviso: Você não pode adicionar uma tarefa vazia.</p>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <section class="bg-neutral-900 p-5 rounded-xl border border-purple-900/20 shadow-lg flex flex-col min-h-[300px]">
                <div class="flex justify-between items-center mb-4 border-b border-neutral-800 pb-3">
                    <h2 class="text-sm font-black uppercase tracking-wider text-purple-300">Objetivos Pendentes</h2>
                    <span id="contadorPendentes" class="bg-purple-950 text-purple-300 border border-purple-800/30 font-black px-2.5 py-0.5 rounded-md text-xs">0</span>
                </div>
                <div id="listaPendentes" class="flex flex-col gap-3"></div>
            </section>

            <section class="bg-neutral-900 p-5 rounded-xl border border-purple-900/20 shadow-lg flex flex-col min-h-[300px]">
                <div class="flex justify-between items-center mb-4 border-b border-neutral-800 pb-3">
                    <h2 class="text-sm font-black uppercase tracking-wider text-purple-300">Histórico de Conclusões</h2>
                    <span id="contadorConcluidas" class="bg-neutral-950 text-neutral-500 border border-neutral-800/40 font-black px-2.5 py-0.5 rounded-md text-xs">0</span>
                </div>
                <div id="listaConcluidas" class="flex flex-col gap-3"></div>
            </section>

        </div>

    </main>

    <script src="./JS/script.js"></script>
</body>
</html>
